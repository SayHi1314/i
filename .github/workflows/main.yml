name: Build iStore OS

on: workflow_dispatch
env:
    TZ: Asia/Shanghai  # 显式指定时区
    GITHUB_TOKEN: ${{ secrets.ACCESS_TOKEN }}
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    # - name: "Optimize Disk Space"
    #   uses: "hugoalh/disk-space-optimizer-ghaction@v0.8.1"
    #   with:
    #     operate_sudo: "True"
    #     general_include: ".+"
    #     general_exclude: |-
    #       ^GCC$
    #       ^G\+\+$
    #       Clang
    #       LLVM
    #     # docker_include: ".+"
    #     # docker_prune: "True"
    #     # docker_clean: "True"
    #     apt_prune: "True"
    #     apt_clean: "True"
    #     homebrew_prune: "True"
    #     homebrew_clean: "True"
    #     npm_prune: "True"
    #     npm_clean: "True"
    #     os_swap: "True"

    - name: Freeing up disk space
      uses: easimon/maximize-build-space@master
      with: 
        root-reserve-mb: 2048
        swap-size-mb: 1
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'
        remove-docker-images: 'true'

    - name: 准备完成了
      uses: actions/checkout@main
   
    - name: 检查服务器配置
      run: |
        echo "若分配的服务器性能不足，务必及时取消，重新运行！"
        echo -e "------------------------------- CPU信息 -------------------------------\n"
        echo "CPU物理数量:$(cat /proc/cpuinfo| grep "physical id"| sort| uniq| wc -l)"
        echo -e "CPU核心及版本信息: $(cat /proc/cpuinfo | grep name | cut -f2 -d: | uniq -c) \n"
        echo -e "------------------------------- 内存信息 -------------------------------\n"
        echo "已安装内存详细信息: "
        sudo lshw -short -C memory | grep GiB
        echo -e "\n"
        echo -e "------------------------------- 磁盘信息 -------------------------------\n"
        echo -e "磁盘数量: $(ls /dev/sd* | grep -v [1-9] | wc -l) \n"
        echo "------------------------------- 磁盘详情 -------------------------------\n"
        df -Th
        
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
    - name: bianyi
      run: |
        echo "------------------------------- 清理Docker镜像和软件 -------------------------------"
        echo "------------------------------- 设置工作目录及时区 -------------------------------"
        sudo timedatectl set-timezone "$TZ"      
        echo "------------------------------- 开始编译 -------------------------------"
        git clone https://github.com/armbian/build.git
        cd build
        sudo chmod +x compile.sh
        sudo ./compile.sh BOARD=mangopi-m28k BRANCH=vendor BUILD_DESKTOP=no BUILD_MINIMAL=no KERNEL_CONFIGURE=no RELEASE=noble

    - name: 上传固件目录
      uses: actions/upload-artifact@v6.0.0
      with:
        name: armbian
        path: build/output/images/






